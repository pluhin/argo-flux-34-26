apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app
  namespace: argocd
spec:
  destination:
    namespace: default
    server: https://kubernetes.default.svc
  project: default
  source:
    path: ./apps
    repoURL: https://github.com/pluhin/argo-flux-34-26.git
    targetRevision: master
  syncPolicy:
    automated:
      enabled: true
